<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3 en Raya</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <h1 class="titulo">3 en Raya</h1>

      <div class="estado-container">
        <span class="label">Turno</span>
        <span id="estado" class="turno-x">X</span>
      </div>
    </div>

    <div id="modalInicio" class="modal">
      <div class="modal-contenido">
        <h2 id="tituloModal">Jugador X</h2>

        <input id="inputNombre" type="text" placeholder="Escribe tu nombre" />

        <button id="btnSiguiente">Siguiente</button>
      </div>
    </div>

    <div class="tablero">
      <div class="celda" data-index="0"></div>
      <div class="celda" data-index="1"></div>
      <div class="celda" data-index="2"></div>
      <div class="celda" data-index="3"></div>
      <div class="celda" data-index="4"></div>
      <div class="celda" data-index="5"></div>
      <div class="celda" data-index="6"></div>
      <div class="celda" data-index="7"></div>
      <div class="celda" data-index="8"></div>
    </div>

    <button id="reiniciar">Reiniciar</button>

    <div id="modal" class="modal oculto">
      <div class="modal-contenido modal-premio">
        <button id="cerrarModal" class="cerrar">&times;</button>

        <div class="icono">🏆</div>

        <h2 id="mensaje" class="titulo-resultado"></h2>

        <p class="subtexto">¡Felicidades! Eres el campeón de esta ronda 🎉</p>

        <div class="separador"></div>

        <div id="acciones" class="acciones">
          <button id="seguir" class="btn btn-azul">🔄 Otra ronda</button>
          <button id="reiniciarTodo" class="btn btn-rojo">
            👥 Cambiar jugadores
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
